<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Flow Hero</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0F1419;
            color: #E5E7EB;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        #heroCanvas {
            display: block;
            background: linear-gradient(135deg, #0F1419 0%, #1F2937 50%, #111827 100%);
        }
        
        .hero-content {
            position: absolute;
            top: 50%;
            left: 8%;
            transform: translateY(-50%);
            z-index: 10;
            max-width: 500px;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60A5FA, #34D399, #FBBF24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            color: #9CA3AF;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .hero-description {
            font-size: 1rem;
            color: #6B7280;
            line-height: 1.5;
        }
        
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        
        /* Light theme */
        body.light {
            background: #F9FAFB;
            color: #1F2937;
        }
        
        body.light #heroCanvas {
            background: linear-gradient(135deg, #F9FAFB 0%, #E5E7EB 50%, #F3F4F6 100%);
        }
        
        body.light .hero-subtitle {
            color: #4B5563;
        }
        
        body.light .hero-description {
            color: #6B7280;
        }
        
        body.light .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.2);
            color: #1F2937;
        }
    </style>
</head>
<body>
    <canvas id="heroCanvas"></canvas>
    
    <div class="hero-content">
        <h1 class="hero-title">Strategic<br>Technology<br>Solutions</h1>
        <p class="hero-subtitle">Architecture • Security • Innovation • Growth</p>
        <p class="hero-description">
            Empowering agencies and SMEs with fractional CTO services, 
            digital transformation strategies, and AI readiness assessments.
        </p>
    </div>
    
    <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
    
    <script>
        const canvas = document.getElementById('heroCanvas');
        const ctx = canvas.getContext('2d');
        let isLight = false;
        
        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Particle system
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 3 + 1;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                this.type = Math.random() > 0.7 ? 'data' : 'node';
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                
                // Fade out
                this.alpha = this.life / this.maxLife;
                
                // Respawn
                if (this.life <= 0) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.life = this.maxLife;
                }
            }
            
            draw() {
                const colors = isLight ? 
                    ['#3B82F6', '#10B981', '#F59E0B', '#EF4444'] :
                    ['#60A5FA', '#34D399', '#FBBF24', '#F87171'];
                
                ctx.save();
                ctx.globalAlpha = this.alpha * 0.8;
                
                if (this.type === 'data') {
                    // Data packet
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                } else {
                    // Network node
                    ctx.strokeStyle = colors[0];
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        // Connection lines
        class Connection {
            constructor(p1, p2) {
                this.p1 = p1;
                this.p2 = p2;
                this.strength = Math.random();
            }
            
            draw() {
                const distance = Math.sqrt(
                    Math.pow(this.p2.x - this.p1.x, 2) + 
                    Math.pow(this.p2.y - this.p1.y, 2)
                );
                
                if (distance < 150) {
                    ctx.save();
                    ctx.globalAlpha = (1 - distance / 150) * 0.3 * this.strength;
                    ctx.strokeStyle = isLight ? '#3B82F6' : '#60A5FA';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(this.p1.x, this.p1.y);
                    ctx.lineTo(this.p2.x, this.p2.y);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }
        
        // Initialize particles
        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle(
                Math.random() * canvas.width,
                Math.random() * canvas.height
            ));
        }
        
        // Floating service icons
        class ServiceIcon {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.baseY = y;
                this.type = type;
                this.time = Math.random() * Math.PI * 2;
                this.amplitude = 20;
                this.frequency = 0.02;
                this.iconMap = {
                    'monitoring': 'monitoring',
                    'cloud': 'cloud_upload', 
                    'advisor': 'psychology',
                    'ai': 'smart_toy'
                };
            }
            
            update() {
                this.time += this.frequency;
                this.y = this.baseY + Math.sin(this.time) * this.amplitude;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = 0.7;
                
                const size = 48;
                const x = this.x - size/2;
                const y = this.y - size/2;
                
                // Draw icon background circle
                ctx.fillStyle = isLight ? 'rgba(59, 130, 246, 0.1)' : 'rgba(96, 165, 250, 0.1)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, size/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw border
                ctx.strokeStyle = isLight ? '#3B82F6' : '#60A5FA';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw Material Design icon using text
                ctx.fillStyle = isLight ? '#3B82F6' : '#60A5FA';
                ctx.font = '24px "Material Symbols Outlined"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.iconMap[this.type], this.x, this.y);
                
                ctx.restore();
            }
        }
        
        // Create service icons
        const serviceIcons = [
            new ServiceIcon(canvas.width * 0.8, canvas.height * 0.2, 'monitoring'),
            new ServiceIcon(canvas.width * 0.85, canvas.height * 0.4, 'cloud'),
            new ServiceIcon(canvas.width * 0.9, canvas.height * 0.6, 'advisor'),
            new ServiceIcon(canvas.width * 0.75, canvas.height * 0.8, 'ai')
        ];
        
        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // Draw connections between nearby particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const connection = new Connection(particles[i], particles[j]);
                    connection.draw();
                }
            }
            
            // Update and draw service icons
            serviceIcons.forEach(icon => {
                icon.update();
                icon.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        function toggleTheme() {
            isLight = !isLight;
            document.body.classList.toggle('light', isLight);
            
            // Update service icon positions on resize
            serviceIcons[0].x = canvas.width * 0.8;
            serviceIcons[1].x = canvas.width * 0.85;
            serviceIcons[2].x = canvas.width * 0.9;
            serviceIcons[3].x = canvas.width * 0.75;
            
            // Resize canvas to update background
            resizeCanvas();
        }
        
        // Start animation
        animate();
    </script>
</body>
</html>
