<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Flow Hero</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0F1419;
            color: #E5E7EB;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        #heroCanvas {
            display: block;
            background: linear-gradient(135deg, #0F1419 0%, #1F2937 50%, #111827 100%);
        }
        
        .hero-content {
            position: absolute;
            top: 50%;
            left: 8%;
            transform: translateY(-50%);
            z-index: 10;
            max-width: 500px;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60A5FA, #34D399, #FBBF24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            color: #9CA3AF;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .hero-description {
            font-size: 1rem;
            color: #6B7280;
            line-height: 1.5;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        
        .theme-toggle, .animation-toggle {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 14px;
        }
        
        /* Light theme */
        body.light {
            background: #F9FAFB;
            color: #1F2937;
        }
        
        body.light #heroCanvas {
            background: linear-gradient(135deg, #F9FAFB 0%, #E5E7EB 50%, #F3F4F6 100%);
        }
        
        body.light .hero-subtitle {
            color: #4B5563;
        }
        
        body.light .hero-description {
            color: #6B7280;
        }
        
        body.light .theme-toggle, body.light .animation-toggle {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.2);
            color: #1F2937;
        }
    </style>
</head>
<body>
    <canvas id="heroCanvas"></canvas>
    
    <div class="hero-content">
        <h1 class="hero-title">Strategic<br>Technology<br>Solutions</h1>
        <p class="hero-subtitle">Architecture • Security • Innovation • Growth</p>
        <p class="hero-description">
            Empowering agencies and SMEs with fractional CTO services, 
            digital transformation strategies, and AI readiness assessments.
        </p>
    </div>
    
    <div class="controls">
        <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
        <button class="animation-toggle" onclick="toggleAnimation()">Pause Animation</button>
    </div>
    
    <script>
        const canvas = document.getElementById('heroCanvas');
        const ctx = canvas.getContext('2d');
        let isLight = false;
        let mouse = { x: 0, y: 0, isActive: false };
        let dataBursts = [];
        let animationPaused = false;
        let animationId;
        let anyIconHovered = false;
        
        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Mouse interaction
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            mouse.isActive = true;
        });
        
        canvas.addEventListener('mouseleave', () => {
            mouse.isActive = false;
        });
        
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            createDataBurst(clickX, clickY);
        });
        
        // Particle system
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 3 + 1;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                this.type = Math.random() > 0.7 ? 'data' : 'node';
            }
            
            update() {
                // Mouse attraction
                if (mouse.isActive) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        const force = (100 - distance) / 100 * 0.02;
                        this.vx += (dx / distance) * force;
                        this.vy += (dy / distance) * force;
                    }
                }
                
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99; // Damping
                this.vy *= 0.99;
                this.life--;
                
                // Fade out
                this.alpha = this.life / this.maxLife;
                
                // Respawn
                if (this.life <= 0) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.life = this.maxLife;
                }
            }
            
            draw() {
                const colors = isLight ? 
                    ['#3B82F6', '#10B981', '#F59E0B', '#EF4444'] :
                    ['#60A5FA', '#34D399', '#FBBF24', '#F87171'];
                
                ctx.save();
                ctx.globalAlpha = this.alpha * 0.8;
                
                if (this.type === 'data') {
                    // Data packet
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                } else {
                    // Network node
                    ctx.strokeStyle = colors[0];
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        // Connection lines
        class Connection {
            constructor(p1, p2) {
                this.p1 = p1;
                this.p2 = p2;
                this.strength = Math.random();
            }
            
            draw() {
                const distance = Math.sqrt(
                    Math.pow(this.p2.x - this.p1.x, 2) + 
                    Math.pow(this.p2.y - this.p1.y, 2)
                );
                
                if (distance < 150) {
                    ctx.save();
                    ctx.globalAlpha = (1 - distance / 150) * 0.3 * this.strength;
                    ctx.strokeStyle = isLight ? '#3B82F6' : '#60A5FA';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(this.p1.x, this.p1.y);
                    ctx.lineTo(this.p2.x, this.p2.y);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }
        
        // Initialize particles
        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle(
                Math.random() * canvas.width,
                Math.random() * canvas.height
            ));
        }
        
        // Floating service icons
        class ServiceIcon {
            constructor(pathOffset, type) {
                this.pathOffset = pathOffset;
                this.type = type;
                this.time = pathOffset;
                this.frequency = 0.008;
                this.isHovered = false;
                this.iconMap = {
                    'monitoring': 'monitoring',
                    'cloud': 'cloud_upload', 
                    'advisor': 'psychology',
                    'ai': 'smart_toy'
                };
                this.descriptions = {
                    'monitoring': { title: 'Reliability & Incident Response', desc: 'SLO/SLI design, alert hygiene, MTTR reduction' },
                    'cloud': { title: 'Modernization & Cloud', desc: 'AWS migration, cost optimization, DevSecOps' },
                    'advisor': { title: 'Trusted Advisor', desc: 'Strategic roadmaps for founders and CTOs' },
                    'ai': { title: 'AI Readiness', desc: 'Secure adoption and governance frameworks' }
                };
                this.updatePosition();
            }
            
            update() {
                // Check if mouse is hovering
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                this.isHovered = mouse.isActive && distance < 30;
                
                // Only update position if no icons are hovered
                if (!anyIconHovered) {
                    this.time += this.frequency;
                    this.updatePosition();
                }
            }
            
            updatePosition() {
                // Infinity loop path
                const centerX = canvas.width * 0.82;
                const centerY = canvas.height * 0.5;
                const scale = 120;
                
                const t = this.time;
                this.x = centerX + scale * Math.cos(t) / (1 + Math.sin(t) * Math.sin(t));
                this.y = centerY + scale * Math.sin(t) * Math.cos(t) / (1 + Math.sin(t) * Math.sin(t));
            }
            
            draw() {
                ctx.save();
                
                ctx.globalAlpha = this.isHovered ? 0.9 : 0.7;
                
                const size = this.isHovered ? 56 : 48;
                
                // Draw icon background circle
                ctx.fillStyle = isLight ? 
                    (this.isHovered ? 'rgba(59, 130, 246, 0.2)' : 'rgba(59, 130, 246, 0.1)') : 
                    (this.isHovered ? 'rgba(96, 165, 250, 0.2)' : 'rgba(96, 165, 250, 0.1)');
                ctx.beginPath();
                ctx.arc(this.x, this.y, size/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw border
                ctx.strokeStyle = isLight ? '#3B82F6' : '#60A5FA';
                ctx.lineWidth = this.isHovered ? 3 : 2;
                ctx.stroke();
                
                // Draw Material Design icon using text
                ctx.fillStyle = isLight ? '#3B82F6' : '#60A5FA';
                ctx.font = `${this.isHovered ? 28 : 24}px "Material Symbols Outlined"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.iconMap[this.type], this.x, this.y);
                
                // Draw tooltip on hover
                if (this.isHovered) {
                    this.drawTooltip();
                }
                
                ctx.restore();
            }
            
            drawTooltip() {
                const info = this.descriptions[this.type];
                const padding = 12;
                const lineHeight = 18;
                
                // Measure text
                ctx.font = '14px system-ui, sans-serif';
                const titleWidth = ctx.measureText(info.title).width;
                ctx.font = '12px system-ui, sans-serif';
                const descWidth = ctx.measureText(info.desc).width;
                const maxWidth = Math.max(titleWidth, descWidth);
                
                const tooltipWidth = maxWidth + padding * 2;
                const tooltipHeight = 50;
                
                // Position tooltip
                let tooltipX = this.x + 40;
                let tooltipY = this.y - tooltipHeight / 2;
                
                // Keep tooltip on screen
                if (tooltipX + tooltipWidth > canvas.width - 10) {
                    tooltipX = this.x - tooltipWidth - 40;
                }
                
                // Draw tooltip background
                ctx.fillStyle = isLight ? 'rgba(255, 255, 255, 0.95)' : 'rgba(30, 30, 30, 0.95)';
                ctx.strokeStyle = isLight ? 'rgba(0, 0, 0, 0.1)' : 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(tooltipX, tooltipY, tooltipWidth, tooltipHeight, 8);
                ctx.fill();
                ctx.stroke();
                
                // Draw text
                ctx.fillStyle = isLight ? '#1F2937' : '#E5E7EB';
                ctx.font = 'bold 14px system-ui, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(info.title, tooltipX + padding, tooltipY + padding + 14);
                
                ctx.fillStyle = isLight ? '#6B7280' : '#9CA3AF';
                ctx.font = '12px system-ui, sans-serif';
                ctx.fillText(info.desc, tooltipX + padding, tooltipY + padding + 32);
            }
        }
        
        // Data burst system
        class DataBurst {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * 3,
                        vy: Math.sin(angle) * 3,
                        life: 60,
                        maxLife: 60
                    });
                }
            }
            
            update() {
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.95;
                    p.vy *= 0.95;
                    p.life--;
                });
                this.particles = this.particles.filter(p => p.life > 0);
            }
            
            draw() {
                this.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.fillStyle = isLight ? '#3B82F6' : '#60A5FA';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
            }
            
            isDead() {
                return this.particles.length === 0;
            }
        }
        
        function createDataBurst(x, y) {
            dataBursts.push(new DataBurst(x, y));
        }
        
        // Create service icons with spacing to avoid center overlap
        const serviceIcons = [
            new ServiceIcon(0, 'monitoring'),
            new ServiceIcon(Math.PI * 0.6, 'cloud'),
            new ServiceIcon(Math.PI, 'advisor'),
            new ServiceIcon(Math.PI * 1.4, 'ai')
        ];
        
        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // Draw connections between nearby particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const connection = new Connection(particles[i], particles[j]);
                    connection.draw();
                }
            }
            
            // Check if any icon is hovered
            anyIconHovered = serviceIcons.some(icon => {
                const dx = mouse.x - icon.x;
                const dy = mouse.y - icon.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return mouse.isActive && distance < 30;
            });
            
            // Update and draw service icons
            serviceIcons.forEach(icon => {
                icon.update();
                icon.draw();
            });
            
            // Update and draw data bursts
            dataBursts.forEach(burst => {
                burst.update();
                burst.draw();
            });
            dataBursts = dataBursts.filter(burst => !burst.isDead());
            
            if (!animationPaused) {
                animationId = requestAnimationFrame(animate);
            }
        }
        
        function toggleTheme() {
            isLight = !isLight;
            document.body.classList.toggle('light', isLight);
            
            // Update service icon positions on resize
            serviceIcons.forEach(icon => icon.updatePosition());
            
            // Resize canvas to update background
            resizeCanvas();
        }
        
        function toggleAnimation() {
            animationPaused = !animationPaused;
            const button = document.querySelector('.animation-toggle');
            button.textContent = animationPaused ? 'Resume Animation' : 'Pause Animation';
            
            if (!animationPaused) {
                animate();
            }
        }
        
        // Start animation
        animate();
    </script>
</body>
</html>
