<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Flow Hero</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="hero-canvas.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0F1419;
            color: #E5E7EB;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            position: relative;
        }
        
        .hero-content {
            position: absolute;
            top: 50%;
            left: 8%;
            transform: translateY(-50%);
            z-index: 10;
            max-width: 500px;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60A5FA, #34D399, #FBBF24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            color: #9CA3AF;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .hero-description {
            font-size: 1rem;
            color: #6B7280;
            line-height: 1.5;
        }
        
        .hero-content {
            position: absolute;
            top: 50%;
            left: 8%;
            transform: translateY(-50%);
            z-index: 10;
            max-width: 500px;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60A5FA, #34D399, #FBBF24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            color: #9CA3AF;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .hero-description {
            font-size: 1rem;
            color: #6B7280;
            line-height: 1.5;
        }
        
        [data-theme="light"] body {
            background: #F9FAFB;
            color: #1F2937;
        }
        
        [data-theme="light"] .hero-subtitle {
            color: #4B5563;
        }
        
        [data-theme="light"] .hero-description {
            color: #6B7280;
        }
    </style>
</head>
<body>
    <canvas id="heroCanvas"></canvas>
    
    <div class="hero-content">
        <h1 class="hero-title">Strategic<br>Technology<br>Solutions</h1>
        <p class="hero-subtitle">Architecture • Security • Innovation • Growth</p>
        <p class="hero-description">
            Empowering agencies and SMEs with fractional CTO services, 
            digital transformation strategies, and AI readiness assessments.
        </p>
    </div>
    
    <div class="controls">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Switch to dark mode">
            <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
        </button>
        <button class="animation-toggle" onclick="toggleAnimation()" aria-label="Toggle animation" title="Pause animation">
            <span class="material-symbols-outlined" id="animation-icon">pause</span>
        </button>
    </div>
    
    <script src="hero-canvas.js"></script>
</body>
</html>
